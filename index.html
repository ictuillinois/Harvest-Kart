<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Harvest Kart</title>
  <style>
    /* ── Reset ── */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%; overflow: hidden; background: #000;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    canvas { display: block; }

    /* ── Z-index tiers ──
       Gameplay:  10-20
       HUD:       50
       Screens:   100
    */

    /* ── Shared nav button (back/home) ── */
    .nav-btn {
      position: absolute; top: 14px; left: 14px;
      z-index: 10;
      background: rgba(0,0,0,0.4);
      border: 1.5px solid rgba(255,255,255,0.25);
      border-radius: 8px;
      color: rgba(255,255,255,0.8);
      font-family: inherit;
      font-size: 0.78rem; font-weight: 600;
      letter-spacing: 1px;
      padding: 7px 13px;
      cursor: pointer;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
    }
    .nav-btn:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.5); }
    .nav-btn:active { transform: scale(0.95); }

    /* keep old class name working */
    .nav-back { /* alias */
      position: absolute; top: 14px; left: 14px;
      z-index: 10;
      background: rgba(0,0,0,0.4);
      border: 1.5px solid rgba(255,255,255,0.25);
      border-radius: 8px;
      color: rgba(255,255,255,0.8);
      font-family: inherit;
      font-size: 0.78rem; font-weight: 600;
      letter-spacing: 1px;
      padding: 7px 13px;
      cursor: pointer;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
    }
    .nav-back:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.5); }
    .nav-back:active { transform: scale(0.95); }

    /* ── Shared keyframes ── */
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.4; }
    }

    /* ── Focus accessibility ── */
    .nav-btn:focus-visible,
    .nav-back:focus-visible,
    button:focus-visible {
      outline: 2px solid #39ff14;
      outline-offset: 3px;
    }

    /* ── Reduced motion ── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
